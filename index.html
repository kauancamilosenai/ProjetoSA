<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="CSS/style.css">
    <title>Adivinhe a Palavra!</title>
</head>
<body>
    <h1 class="titulo">Descubra a Palavra!</h1>
    <main>
        <!-- terá 1 span para cada letra -->
        <section class="sectionPalavraSecreta">
            <p id="palavraSecreta" class="palavraSecretaCss"> <span>_</span> <span>_</span> <span>_</span> <span>_</span></p>
        </section>

        <section class="interacoes">
            <input type="text" id="userInput" class="userInput" maxlength="1" placeholder="letra">
            <button type="submit" id="botao" class="botao" > botao tentar XD </button>
        </section>
             
        <section class="informacoes">
            <p>Tentativas restantes: <span id="tentativas">6</span> </p>
            <p>Pontuação: <span id="pontuacao">0</span> </p>
            <p>Letras usadas: <span id="letras-usadas"></span> </p>
        </section>
    </main>
</body>
</html>
