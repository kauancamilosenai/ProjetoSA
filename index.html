<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="favicon/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="CSS/style.css">
    <title>Adivinhe a Palavra!</title>
</head>
<body>
    <h1 class="titulo">Descubra a Palavra!</h1>
    <main>
        <!-- terá 1 span para cada letra com seu proprio id -->
        <div id="palavra,Secreta" class="palavraSecretaCss">
            <span>_ </span> <span<span>_ </span><span>_ </span><span>_ </span>_ </span> 
        </div>

        <section class="interacoes">
            <button type="submit" id="restartButtonJS" class="restartButtonCss">Reiniciar</button>
            <input type="text" id="userInput" class="classUserInput" maxlength="1" placeholder="Letra" style="font-size:30px;">
            <button type="submit" id="botaoJS" class="botaoTentar" > TENTAR </button>
        </section>
             
        <section class="informacoes">
            <p id="tentativasRestantes">Tentativas restantes: <span id="tentativas">6</span></p>
            <p class="pontuacao">Pontuação: <span id="pontuacao">0</span> </p>
            <p id="displayLetrasUsadas">Letras usadas: <span id="letras-usadas"></span> </p>
        </section>

        <img class="referencia" src="favicon/sedutor.png" alt="O sedutor rsrs">
    </main>
</body>
<script src="assets/JS/javaScript.js"></script>
</html>
